[pytest]
# asyncio_mode = auto: every async test function is treated as an asyncio test
# without needing an explicit @pytest.mark.asyncio decorator on each one.
asyncio_mode = auto

# asyncio_default_fixture_loop_scope: sets the default event-loop scope for
# async fixtures to "function" so each test gets a fresh loop.
# This suppresses the PytestDeprecationWarning from pytest-asyncio 0.24.
asyncio_default_fixture_loop_scope = function
